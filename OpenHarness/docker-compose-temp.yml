# ============================================================================
# OpenHarness Docker Compose — 官方 pip 安装 + 源码挂载热重载
# ============================================================================
# 使用方法：
#   docker compose up            # 启动
#   docker compose build         # 重新构建（依赖变了才需要）
#   docker compose run --rm bash # 进入容器终端
#
# API Key 配置：
#   创建 .env 文件：
#     ANTHROPIC_API_KEY=sk-ant-xxx
#     OPENAI_API_KEY=sk-xxx
# ============================================================================

services:
  openharness:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
        UV_VERSION: "0.7.3"
        MINICONDA_VERSION: "py312_25.3.1-1"
    image: openharness:latest
    container_name: openharness
    environment:
      - PYTHONUNBUFFERED=1
      - WATCHFILES_FORCE_POLLING=true
      # PYTHONPATH 已在 Dockerfile 中设置，挂载源码优先加载
      # API Keys — 通过 .env 文件传入
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # 源码挂载 — 修改宿主机代码，容器内立即生效
      # PYTHONPATH=/app/src 使 Python 优先从这里导入，覆盖 pip 安装的版本
      - ./src:/app/src
      - ./ohmo:/app/ohmo
      # 持久化配置和会话
      - openharness-config:/home/ohuser/.openharness
    stdin_open: true
    tty: true

volumes:
  openharness-config:
    name: openharness-config
