# End-to-end acceptance stack for the scale-multi-instance change.
#
# Brings up the full topology with role separation (api x N / worker x M) plus
# postgres / redis / minio, and uses the e2e derived image (oh-e2e:latest)
# which ships a faithful `oh` stub so rendering works without an API key.
#
#   docker compose -p e2e -f docker-compose.e2e.yml up -d --scale api=2 --scale worker=2
#
# The anchor is defined first so it can be merged into every service.
x-common-env: &common-env
  OH_DB_URL: "postgresql+asyncpg://oh:oh@postgres:5432/oh"
  OH_DB_SYNC_URL: "postgresql+psycopg://oh:oh@postgres:5432/oh"
  OH_DB_MIGRATION_URL: "postgresql+asyncpg://oh:oh@postgres:5432/oh"
  OH_BROKER_URL: "redis://redis:6379/0"
  OH_STORAGE_KIND: "s3"
  OH_S3_ENDPOINT: "http://minio:9000"
  OH_S3_BUCKET: "openharness"
  OH_S3_REGION: "us-east-1"
  OH_S3_ACCESS_KEY: "minioadmin"
  OH_S3_SECRET_KEY: "minioadmin"
  OH_OH_BIN: "/usr/local/bin/oh-stub"
  OH_STUB_SLEEP_SECONDS: "${OH_STUB_SLEEP_SECONDS:-90}"
  OH_SCHEDULER_BACKEND: "celery"
  OH_CELERY_CONCURRENCY: "${OH_CELERY_CONCURRENCY:-4}"
  OH_WORKER_QUEUES: "high,normal,low"
  OH_MAX_CONCURRENT_RENDERS: "${OH_MAX_RENDERS:-4}"
  OH_API_WORKERS: "1"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: oh
      POSTGRES_PASSWORD: oh
      POSTGRES_DB: oh
    volumes:
      - oh-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oh"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - oh-minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["sh", "-c"]
    command: >
      "until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 2; done;
       mc mb -p local/openharness 2>/dev/null;
       exit 0"

  migrate:
    image: oh-e2e:latest
    environment:
      <<: *common-env
      OH_ROLE: migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: oh-e2e:latest
    environment:
      <<: *common-env
      OH_ROLE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  worker:
    image: oh-e2e:latest
    environment:
      <<: *common-env
      OH_ROLE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  beat:
    image: oh-e2e:latest
    environment:
      <<: *common-env
      OH_ROLE: beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  oh-pg:
  oh-minio:
