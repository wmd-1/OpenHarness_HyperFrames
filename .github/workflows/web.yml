name: web-frontend-ci

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build (tsc -b && vite build)
        run: npm run build

  image:
    name: Docker image build (verify)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (no push)
        run: docker build -t openharness-hyperprames-web:ci ./web
