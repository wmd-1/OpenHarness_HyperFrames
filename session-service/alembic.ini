# Alembic configuration for the session service.
#
# IMPORTANT: uses an independent ``version_table`` (alembic_version_session) so
# session migrations never collide with the video-service's alembic_version head.
# The URL is overridden at runtime from settings.db_migration_url (see env.py).

[alembic]
script_location = alembic
prepend_sys_path = .
version_table = alembic_version_session
sqlalchemy.url = postgresql+psycopg://oh:oh@localhost:5432/oh

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)-20s] %(message)s
datefmt = %H:%M:%S
